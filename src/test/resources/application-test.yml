spring:
  datasource:
    url: jdbc:h2:mem:blemberg;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

debug: false

logging:
  level:
    root: WARN
    org.hibernate.SQL: WARN
    org.springframework: WARN

blemberg:
  providers:
    twelve-data:
      base-url: http://localhost
      api-key: test
      credits-per-minute: 8
      credits-per-day: 800
      request-timeout: 2s
    fred:
      base-url: http://localhost
      api-key: test
      request-timeout: 2s
